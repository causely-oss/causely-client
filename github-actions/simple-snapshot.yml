name: Create Snapshot (V2)

# Example using the v2 bash script with causely_graphql.sh library
# See USING_BASH_SCRIPTS.md for detailed setup patterns

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      snapshot_name:
        description: 'Snapshot name'
        required: false
        default: 'GitHub Actions Snapshot'
      tags:
        description: 'Tags (comma-separated: key=value,key2=value2)'
        required: false
        default: ''
  
  push:
    branches: [main]  # Auto-trigger on push to main

jobs:
  create-snapshot:
    runs-on: ubuntu-latest
    
    env:
      FRONTEGG_CLIENT_ID: ${{ secrets.FRONTEGG_CLIENT_ID }}
      FRONTEGG_CLIENT_SECRET: ${{ secrets.FRONTEGG_CLIENT_SECRET }}
    
    steps:
      # 1. Checkout your application repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Checkout Causely scripts (using sparse checkout for efficiency)
      - name: Checkout Causely scripts
        uses: actions/checkout@v4
        with:
          repository: Causely/causely-api-client
          sparse-checkout: |
            shell
          path: .causely
      
      # 3. Install required dependencies
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      
      # 4. Create the snapshot using v2 script
      - name: Create snapshot
        id: snapshot
        run: |
          # Calculate start time (2 hours ago)
          START_TIME=$(date -u -d "2 hours ago" +"%Y-%m-%dT%H:%M:%SZ")
          
          # Set snapshot name (from input or default)
          SNAPSHOT_NAME="${{ github.event.inputs.snapshot_name || 'GitHub Actions Snapshot' }}"
          
          # Create snapshot
          OUTPUT=$(.causely/shell/create_snapshot.sh \
            --name "$SNAPSHOT_NAME" \
            --description "Automated snapshot from workflow run #${{ github.run_number }}" \
            --start-time "$START_TIME" \
            --tag "source=github-actions" \
            --tag "workflow=${{ github.workflow }}" \
            --tag "run_number=${{ github.run_number }}" \
            --tag "commit=${{ github.sha }}" \
            --tag "branch=${{ github.ref_name }}")
          
          echo "$OUTPUT"
          
          # Extract snapshot ID from output
          SNAPSHOT_ID=$(echo "$OUTPUT" | grep "Snapshot ID:" | awk '{print $NF}')
          echo "snapshot_id=$SNAPSHOT_ID" >> $GITHUB_OUTPUT
          echo "SNAPSHOT_ID=$SNAPSHOT_ID" >> $GITHUB_ENV
      
      # 5. Add job summary
      - name: Add job summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ✅ Snapshot Created Successfully
          
          **Snapshot ID:** \`${{ steps.snapshot.outputs.snapshot_id }}\`
          
          **Details:**
          - Name: ${{ github.event.inputs.snapshot_name || 'GitHub Actions Snapshot' }}
          - Workflow: ${{ github.workflow }}
          - Run Number: ${{ github.run_number }}
          - Commit: \`${{ github.sha }}\`
          - Branch: ${{ github.ref_name }}
          
          **Note:** Snapshot is processing in the background. Use polling to wait for completion.
          
          **View in Causely:**
          [Open Snapshot](https://app.causely.io/snapshots/${{ steps.snapshot.outputs.snapshot_id }})
          EOF
      
      # 6. Comment on PR (if triggered from PR)
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📸 Causely Snapshot Created
              
              **Snapshot ID:** \`${{ env.SNAPSHOT_ID }}\`
              
              [View Snapshot](https://app.causely.io/snapshots/${{ env.SNAPSHOT_ID }})`
            })

# Alternative: Using scripts in your own repository
# If you've copied the scripts to your repo (e.g., ./scripts/), use:
